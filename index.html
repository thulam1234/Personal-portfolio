// --- MINI CHART COMPONENT ---
function MiniBarChart({ data, color, width = 120, height = 40 }) {
  const max = Math.max(...data);
  const barW = (width - (data.length - 1) * 3) / data.length;
  return (
    <svg width={width} height={height} style={{ display: "block" }}>
      {data.map((v, i) => {
        const h = (v / max) * height * 0.9;
        return (
          <rect
            key={i}
            x={i * (barW + 3)}
            y={height - h}
            width={barW}
            height={h}
            rx={2}
            fill={color}
            opacity={0.25 + (v / max) * 0.65}
          />
        );
      })}
    </svg>
  );
}

// --- ANIMATED SECTION HOOK ---
function useInView(threshold = 0.15) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) { setVisible(true); obs.unobserve(el); } },
      { threshold }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, [threshold]);
  return [ref, visible];
}

function FadeIn({ children, delay = 0, className = "" }) {
  const [ref, visible] = useInView();
  return (
    <div
      ref={ref}
      className={className}
      style={{
        opacity: visible ? 1 : 0,
        transform: visible ? "translateY(0)" : "translateY(28px)",
        transition: `opacity 0.7s ease ${delay}s, transform 0.7s ease ${delay}s`,
      }}
    >
      {children}
    </div>
  );
}

// --- TYPEWRITER ---
function Typewriter({ text, speed = 45, delay = 600 }) {
  const [displayed, setDisplayed] = useState("");
  const [showCursor, setShowCursor] = useState(true);
  useEffect(() => {
    let i = 0;
    const timeout = setTimeout(() => {
      const interval = setInterval(() => {
        if (i < text.length) {
          setDisplayed(text.slice(0, i + 1));
          i++;
        } else {
          clearInterval(interval);
          setTimeout(() => setShowCursor(false), 1500);
        }
      }, speed);
      return () => clearInterval(interval);
    }, delay);
    return () => clearTimeout(timeout);
  }, [text, speed, delay]);
  return (
    <span>
      {displayed}
      {showCursor && <span className="typewriter-cursor">|</span>}
    </span>
  );
}

// --- DATA PARTICLES CANVAS ---
function DataParticles() {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let animId;
    let particles = [];
    const resize = () => {
      canvas.width = canvas.parentElement.offsetWidth;
      canvas.height = canvas.parentElement.offsetHeight;
    };
    resize();
    window.addEventListener("resize", resize);

    for (let i = 0; i < 40; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        r: Math.random() * 2 + 1,
      });
    }

    const draw = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach((p, i) => {
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(74, 103, 65, 0.15)";
        ctx.fill();

        particles.forEach((p2, j) => {
          if (j <= i) return;
          const dx = p.x - p2.x;
          const dy = p.y - p2.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 120) {
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = `rgba(74, 103, 65, ${0.06 * (1 - dist / 120)})`;
            ctx.lineWidth = 0.8;
            ctx.stroke();
          }
        });
      });
      animId = requestAnimationFrame(draw);
    };
    draw();
    return () => {
      cancelAnimationFrame(animId);
      window.removeEventListener("resize", resize);
    };
  }, []);
  return (
    <canvas
      ref={canvasRef}
      style={{
        position: "absolute",
        inset: 0,
        width: "100%",
        height: "100%",
        pointerEvents: "none",
        zIndex: 0,
      }}
    />
  );
}

  .portfolio-nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;

    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);

  .nav-inner {

    justify-content: space-between;

  }

  .nav-logo {

  .nav-links {

  .nav-links a {
    text-decoration: none;

    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;

  .nav-links a:hover::after { width: 100%; }

  /* HERO */
  .hero-section {
    min-height: auto;
    display: flex;
    align-items: center;
    padding: 100px 32px 60px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(180deg, var(--cream) 0%, #EEF4EB 100%);
  }

  .hero-section::before {
    content: '';
    position: absolute;
    top: -20%;
    right: -10%;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(74, 130, 60, 0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-section::after {
    content: '';
    position: absolute;
    bottom: -10%;
    left: -5%;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(74, 103, 65, 0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-mountains {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 100px;
    pointer-events: none;
  }

  .hero-leaf {
    position: absolute;
    opacity: 0.12;
    pointer-events: none;
  }

  .hero-leaf-1 {
    top: 15%;
    left: 8%;
    font-size: 48px;
    transform: rotate(-25deg);
    animation: sway 6s ease-in-out infinite;
  }

  .hero-leaf-2 {
    top: 25%;
    right: 10%;
    font-size: 36px;
    transform: rotate(15deg);
    animation: sway 5s ease-in-out infinite reverse;
  }

  .hero-leaf-3 {
    bottom: 22%;
    left: 5%;
    font-size: 28px;
    transform: rotate(40deg);
    animation: sway 7s ease-in-out infinite;
  }

  .hero-leaf-4 {
    top: 40%;
    right: 5%;
    font-size: 40px;
    transform: rotate(-10deg);
    animation: sway 8s ease-in-out infinite reverse;
  }

  @keyframes sway {
    0%, 100% { transform: translateY(0) rotate(-25deg); }
    50% { transform: translateY(-12px) rotate(-15deg); }
  }

  .hero-inner {
    max-width: 720px;
    margin: 0 auto;
    width: 100%;
    text-align: center;
  }

  .hero-greeting {
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 500;
    color: var(--forest);
    letter-spacing: 0.08em;
    text-transform: uppercase;

    align-items: center;
    justify-content: center;
    gap: 10px;

  .hero-name {
    font-family: var(--font-display);
    font-size: clamp(36px, 5vw, 52px);
    line-height: 1.1;
    color: var(--charcoal);
    margin-bottom: 16px;
    letter-spacing: -0.02em;
  }

  .hero-tagline {
    font-size: 18px;
    font-weight: 300;
    color: var(--muted);
    margin-bottom: 12px;
    line-height: 1.5;
  }

  .hero-summary {
    font-size: 15px;

  .hero-bio {

    margin-right: auto;

  .hero-cta {

    letter-spacing: 0.02em;

  }

  .hero-cta:hover {
    background: #3B5534;
    transform: translateY(-2px);

  .fun-facts {

    gap: 12px;

  .fun-fact {

    gap: 12px;

    border-radius: 12px;
    border: 1px solid rgba(232, 220, 200, 0.5);

  }

  .fun-fact:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
  }

  .fun-fact-emoji {
    font-size: 22px;
    flex-shrink: 0;
  }

  .fun-fact-label {
    font-size: 11px;
    font-weight: 600;

    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .fun-fact-value {
    font-size: 14px;
    color: var(--charcoal);

    line-height: 1.3;
  }

  .hero-visual {
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .avatar-frame {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;

  .avatar-frame::before {
    content: '';

    inset: -12px;

  .avatar-frame::after {
    content: '';
    position: absolute;
    inset: -24px;
    border-radius: 50%;
    border: 1px solid rgba(74, 103, 65, 0.08);
    animation: spin 45s linear infinite reverse;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .avatar-initials {
    font-family: var(--font-display);
    font-size: 80px;
    color: var(--terracotta);
    opacity: 0.7;
  }

  .floating-badge {
    position: absolute;
    background: var(--card-bg);
    padding: 10px 16px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
    animation: float 4s ease-in-out infinite;
  }

  .floating-badge.top-right { top: 20px; right: -10px; animation-delay: 0s; }
  .floating-badge.bottom-left { bottom: 30px; left: -20px; animation-delay: 1.5s; }
  .floating-badge.bottom-right { bottom: -10px; right: 20px; animation-delay: 3s; }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  /* SECTION COMMON */
  .section {
    padding: 64px 32px;
  }

  .section-inner {
    max-width: 1100px;
    margin: 0 auto;
  }

  .section-label {
    font-size: 13px;

    color: var(--forest);

    text-transform: uppercase;

  .section-title {
    font-family: var(--font-display);

  /* PROJECTS */

    background: var(--warm-bg);

  .about-content {
    max-width: 680px;
    margin: 0 auto;

  /* ABOUT COMMUNITY */
  .about-community {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;

    padding-top: 24px;

  .about-community-item {

    margin-bottom: 8px;
  }

  .about-community-text {
    font-size: 13px;
    color: var(--muted);

  }

  /* FLOATING CONTACT BAR */
  .floating-contact-bar {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 12px 20px;
    background: rgba(46, 42, 38, 0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 50px;
    z-index: 100;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
  }

  .floating-contact-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 22px;
    color: rgba(255, 255, 255, 0.85);
    text-decoration: none;
    border-radius: 40px;
    font-size: 15px;
    font-weight: 500;
    transition: all 0.25s ease;
  }

  .floating-contact-item:hover {
    background: rgba(255, 255, 255, 0.15);
    color: white;
  }

  .floating-contact-icon {
    font-size: 17px;
    width: 24px;
    text-align: center;
  }

  .floating-contact-label {
    font-size: 15px;
  }

  .floating-contact-item {
    position: relative;
  }

  .floating-contact-item::before {
    content: attr(data-tooltip);
    position: absolute;
    bottom: calc(100% + 10px);
    left: 50%;
    transform: translateX(-50%) translateY(6px);
    background: white;
    color: var(--charcoal);
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    padding: 6px 12px;
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
  }

  .floating-contact-item::after {
    content: '';
    position: absolute;
    bottom: calc(100% + 4px);
    left: 50%;
    transform: translateX(-50%) translateY(6px);
    border: 5px solid transparent;
    border-top-color: white;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
  }

  .floating-contact-item:hover::before,
  .floating-contact-item:hover::after {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ABOUT STATS */
  .about-stats {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
    margin: 24px auto 28px;
    padding: 22px 40px;

    border-radius: 16px;
    border: 1px solid rgba(232, 220, 200, 0.5);

  .value-card {

  /* CAREER PROGRESSION */
  .career-progression {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin-bottom: 24px;
    padding: 20px 20px;

    flex-direction: column;
    align-items: center;
    gap: 6px;

  .career-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;

  .career-dot.next {

    border-style: dashed;
    animation: pulse-dot 2s ease-in-out infinite;
  }
