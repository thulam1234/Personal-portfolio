// --- MINI CHART COMPONENT ---
function MiniBarChart({ data, color, width = 120, height = 40 }) {
  const max = Math.max(...data);
  const barW = (width - (data.length - 1) * 3) / data.length;
  return (
    <svg width={width} height={height} style={{ display: "block" }}>
      {data.map((v, i) => {
        const h = (v / max) * height * 0.9;
        return (
          <rect
            key={i}
            x={i * (barW + 3)}
            y={height - h}
            width={barW}
            height={h}
            rx={2}
            fill={color}
            opacity={0.25 + (v / max) * 0.65}
          />
        );
      })}
    </svg>
  );
}

// --- ANIMATED SECTION HOOK ---
function useInView(threshold = 0.15) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) { setVisible(true); obs.unobserve(el); } },
      { threshold }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, [threshold]);
  return [ref, visible];
}

function FadeIn({ children, delay = 0, className = "" }) {
  const [ref, visible] = useInView();
  return (
    <div
      ref={ref}
      className={className}
      style={{
        opacity: visible ? 1 : 0,
        transform: visible ? "translateY(0)" : "translateY(28px)",
        transition: `opacity 0.7s ease ${delay}s, transform 0.7s ease ${delay}s`,
      }}
    >
      {children}
    </div>
  );
}

// --- TYPEWRITER ---
function Typewriter({ text, speed = 45, delay = 600 }) {
  const [displayed, setDisplayed] = useState("");
  const [showCursor, setShowCursor] = useState(true);
  useEffect(() => {
    let i = 0;
    const timeout = setTimeout(() => {
      const interval = setInterval(() => {
        if (i < text.length) {
          setDisplayed(text.slice(0, i + 1));
          i++;
        } else {
          clearInterval(interval);
          setTimeout(() => setShowCursor(false), 1500);
        }
      }, speed);
      return () => clearInterval(interval);
    }, delay);
    return () => clearTimeout(timeout);
  }, [text, speed, delay]);
  return (
    <span>
      {displayed}
      {showCursor && <span className="typewriter-cursor">|</span>}
    </span>
  );
}

// --- DATA PARTICLES CANVAS ---
function DataParticles() {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let animId;
    let particles = [];
    const resize = () => {
      canvas.width = canvas.parentElement.offsetWidth;
      canvas.height = canvas.parentElement.offsetHeight;
    };
    resize();
    window.addEventListener("resize", resize);

    for (let i = 0; i < 40; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        r: Math.random() * 2 + 1,
      });
    }

    const draw = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach((p, i) => {
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(74, 103, 65, 0.15)";
        ctx.fill();

        particles.forEach((p2, j) => {
          if (j <= i) return;
          const dx = p.x - p2.x;
          const dy = p.y - p2.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 120) {
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = `rgba(74, 103, 65, ${0.06 * (1 - dist / 120)})`;
            ctx.lineWidth = 0.8;
            ctx.stroke();
          }
        });
      });
      animId = requestAnimationFrame(draw);
    };
    draw();
    return () => {
      cancelAnimationFrame(animId);
      window.removeEventListener("resize", resize);
    };
  }, []);
  return (
    <canvas
      ref={canvasRef}
      style={{
        position: "absolute",
        inset: 0,
        width: "100%",
        height: "100%",
        pointerEvents: "none",
        zIndex: 0,
      }}
    />
  );
}

    color: var(--charcoal);
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }

  ::selection {
    background: var(--forest);
    color: white;
  }

  .typewriter-cursor {
    color: var(--forest);
    font-weight: 300;
    animation: blink 0.8s step-end infinite;
    margin-left: 2px;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .data-grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(74, 103, 65, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74, 103, 65, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .portfolio-nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background: rgba(253, 246, 236, 0.7);
    border-bottom: 1px solid rgba(200, 190, 170, 0.2);
    transition: box-shadow 0.3s ease;
  }

  .portfolio-nav.scrolled {
    box-shadow: 0 2px 20px rgba(46, 42, 38, 0.06);
  }

  .nav-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 16px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .nav-logo {
    font-family: var(--font-display);
    font-size: 20px;
    color: var(--charcoal);
    text-decoration: none;
    letter-spacing: -0.02em;
  }

  .nav-links {
    display: flex;
    gap: 32px;
    list-style: none;
  }

  .nav-links a {
    text-decoration: none;
    color: var(--muted);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: color 0.25s ease;
    position: relative;
  }

  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0;
    width: 0;
    height: 2px;
    background: var(--forest);
    border-radius: 1px;
    transition: width 0.3s ease;
  }

  .nav-links a:hover { color: var(--forest); }
  .nav-links a:hover::after { width: 100%; }
  .nav-links a.active { color: var(--forest); }
  .nav-links a.active::after { width: 100%; }

  /* HERO */
  .hero-section {
    min-height: 90vh;
    display: flex;
    align-items: center;
    padding: 120px 32px 120px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(180deg, var(--cream) 0%, #EEF4EB 100%);
  }

  .hero-section::before {
    content: '';
    position: absolute;
    top: -20%;
    right: -10%;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(74, 130, 60, 0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-section::after {
    content: '';
    position: absolute;
    bottom: -10%;
    left: -5%;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(74, 103, 65, 0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-mountains {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 180px;
    pointer-events: none;
  }

  .hero-leaf {
    position: absolute;
    opacity: 0.12;
    pointer-events: none;
  }

  .hero-leaf-1 {
    top: 15%;
    left: 8%;
    font-size: 48px;
    transform: rotate(-25deg);
    animation: sway 6s ease-in-out infinite;
  }

  .hero-leaf-2 {
    top: 25%;
    right: 10%;
    font-size: 36px;
    transform: rotate(15deg);
    animation: sway 5s ease-in-out infinite reverse;
  }

  .hero-leaf-3 {
    bottom: 22%;
    left: 5%;
    font-size: 28px;
    transform: rotate(40deg);
    animation: sway 7s ease-in-out infinite;
  }

  .hero-leaf-4 {
    top: 40%;
    right: 5%;
    font-size: 40px;
    transform: rotate(-10deg);
    animation: sway 8s ease-in-out infinite reverse;
  }

  @keyframes sway {
    0%, 100% { transform: translateY(0) rotate(-25deg); }
    50% { transform: translateY(-12px) rotate(-15deg); }
  }

  .hero-inner {
    max-width: 720px;
    margin: 0 auto;
    width: 100%;
    text-align: center;
  }

  .hero-greeting {
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 500;
    color: var(--forest);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .hero-name {
    font-family: var(--font-display);
    font-size: clamp(42px, 5.5vw, 64px);
    line-height: 1.1;
    color: var(--charcoal);
    margin-bottom: 16px;
    letter-spacing: -0.02em;
  }

  .hero-tagline {
    font-size: 22px;
    font-weight: 300;
    color: var(--muted);
    margin-bottom: 28px;
    line-height: 1.5;
  }

  .hero-bio {
    font-size: 16px;
    color: var(--muted);
    line-height: 1.75;
    max-width: 580px;
    margin-left: auto;
    margin-right: auto;
    margin-bottom: 36px;
    text-align: left;
  }

  .hero-cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 32px;
    background: var(--forest);
    color: white;
    text-decoration: none;
    border-radius: 50px;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.02em;
    transition: all 0.3s ease;
    border: none;
    cursor: pointer;
  }

  .hero-cta:hover {
    background: #3B5534;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(74, 103, 65, 0.3);
  }

  .fun-facts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 32px;
  }

  .fun-fact {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--card-bg);
    border-radius: 12px;
    border: 1px solid rgba(232, 220, 200, 0.5);
    transition: all 0.3s ease;
  }

  .fun-fact:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
  }

  .fun-fact-emoji {
    font-size: 22px;
    flex-shrink: 0;
  }

  .fun-fact-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--terracotta);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .fun-fact-value {
    font-size: 14px;
    color: var(--charcoal);
    font-weight: 500;
    line-height: 1.3;
  }

  .hero-visual {
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .avatar-frame {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow: 0 0 40px rgba(74, 103, 65, 0.15), 0 0 80px rgba(74, 103, 65, 0.05);
    margin: 0 auto 28px;
  }

  .avatar-frame::before {
    content: '';
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    border: 1.5px dashed var(--forest);
    opacity: 0.25;
    animation: spin 30s linear infinite;
  }

  .avatar-frame::after {
    content: '';
    position: absolute;
    inset: -24px;
    border-radius: 50%;
    border: 1px solid rgba(74, 103, 65, 0.08);
    animation: spin 45s linear infinite reverse;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .avatar-initials {
    font-family: var(--font-display);
    font-size: 80px;
    color: var(--terracotta);
    opacity: 0.7;
  }

  .floating-badge {
    position: absolute;
    background: var(--card-bg);
    padding: 10px 16px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
    animation: float 4s ease-in-out infinite;
  }

  .floating-badge.top-right { top: 20px; right: -10px; animation-delay: 0s; }
  .floating-badge.bottom-left { bottom: 30px; left: -20px; animation-delay: 1.5s; }
  .floating-badge.bottom-right { bottom: -10px; right: 20px; animation-delay: 3s; }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  /* SECTION COMMON */
  .section {
    padding: 100px 32px;
  }

  .section-inner {
    max-width: 1100px;
    margin: 0 auto;
  }

  .section-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--forest);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .section-title {
    font-family: var(--font-display);
    font-size: clamp(30px, 4vw, 40px);
    color: var(--charcoal);
    margin-bottom: 48px;
    letter-spacing: -0.01em;
  }

  /* PROJECTS */
  .projects-section {
    background: var(--warm-bg);
  }

  .about-content {
    max-width: 680px;
    margin: 0 auto;
  }

  .about-text {
    font-size: 17px;
    color: var(--muted);
    line-height: 1.8;
    margin-bottom: 20px;
    text-align: left;
  }

  .about-text:last-child {
    margin-bottom: 0;
  }

  /* ABOUT STATS */
  .about-stats {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
    margin: 36px auto 40px;
    padding: 28px 40px;
    background: var(--card-bg);
    border-radius: 16px;
    border: 1px solid rgba(232, 220, 200, 0.5);
    max-width: 720px;
  }

  .about-stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .about-stat-number {
    font-family: var(--font-display);
    font-size: 32px;
    color: var(--forest);
    line-height: 1;
  }

  .about-stat-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .about-stat-divider {
    width: 1px;
    height: 40px;
    background: var(--sand);
  }

  /* PERSONAL FLOW */
  .values-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 18px;
    margin-top: 32px;
  }

  .value-card {
    background: var(--card-bg);
    border-radius: 14px;
    padding: 24px 20px;
    border: 1px solid rgba(232, 220, 200, 0.5);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 8px;
    transition: all 0.3s ease;
  }

  .value-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(74, 103, 65, 0.08);
  }

  .value-icon {
    margin-bottom: 4px;
  }

  .value-title {
    font-family: var(--font-display);
    font-size: 17px;
    color: var(--charcoal);
  }

  .value-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
  }

  .personal-flow {
    max-width: 720px;
    margin: 36px auto 0;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  .personal-row {
    display: flex;
    align-items: flex-start;
    gap: 28px;
    padding: 28px 32px;
    background: var(--card-bg);
    border-radius: 16px;
    border: 1px solid rgba(232, 220, 200, 0.5);
    transition: all 0.3s ease;
  }

  .personal-row:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(74, 103, 65, 0.07);
  }

  .personal-row.reverse {
    flex-direction: row-reverse;
  }

  .personal-icon-wrap {
    width: 80px;
    height: 80px;
    border-radius: 16px;
    background: rgba(74, 103, 65, 0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .personal-flow-text {
    font-size: 16px;
    color: var(--muted);
    line-height: 1.8;
    flex: 1;
  }

  .projects-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 24px;
    max-width: 720px;
  }

  .featured-project {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    background: var(--card-bg);
    border-radius: 16px;
    padding: 36px;
    border: 1px solid rgba(232, 220, 200, 0.5);
    align-items: center;
  }

  .featured-project-title {
    font-family: var(--font-display);
    font-size: 24px;
    color: var(--charcoal);
    margin-bottom: 12px;
  }

  .project-category {
    font-size: 12px;
    font-weight: 600;
    color: var(--forest);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: inline-block;
    padding: 4px 12px;
    background: rgba(74, 103, 65, 0.08);
    border-radius: 20px;
  }

  .featured-project-desc {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.75;
    margin-top: 14px;
  }

  .project-github-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 18px;
    padding: 10px 20px;
    background: var(--charcoal);
    color: white;
    text-decoration: none;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.3s ease;
  }

  .project-github-link:hover {
    background: #1a1714;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(46, 42, 38, 0.25);
  }

  .retention-chart {
    background: var(--cream);
    border-radius: 12px;
    padding: 24px;
  }

  .retention-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 16px;
  }

  .retention-bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .retention-bar-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    width: 28px;
    text-align: right;
  }

  .retention-bar-track {
    flex: 1;
    height: 18px;
    background: rgba(74, 103, 65, 0.06);
    border-radius: 6px;
    overflow: hidden;
  }

  .retention-bar-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 1.2s ease;
  }

  .retention-bar-pct {
    font-size: 13px;
    font-weight: 600;
    color: var(--charcoal);
    width: 36px;
  }

  .retention-drop-note {
    margin-top: 12px;
    font-size: 13px;
    font-weight: 600;
    color: #c0392b;
    text-align: center;
    padding: 6px 12px;
    background: rgba(192, 57, 43, 0.06);
    border-radius: 8px;
  }

  .coming-soon-card {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-top: 20px;
    padding: 24px;
    border: 2px dashed rgba(74, 103, 65, 0.2);
    border-radius: 16px;
    background: rgba(74, 103, 65, 0.02);
  }

  .coming-soon-text {
    font-size: 15px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.02em;
  }

  .project-card {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 32px;
    position: relative;
    overflow: hidden;
    transition: all 0.35s ease;
    cursor: default;
    border: 1px solid rgba(232, 220, 200, 0.5);
  }

  .project-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.06);
  }

  .project-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    border-radius: 16px 16px 0 0;
  }

  .project-topline {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }

  .project-title {
    font-family: var(--font-display);
    font-size: 21px;
    color: var(--charcoal);
    margin-bottom: 0;
  }

  .project-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
  }

  .project-tag {
    font-size: 12px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--cream);
    color: var(--muted);
  }

  .project-desc {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.7;
  }

  /* CAREER PROGRESSION */
  .career-progression {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin-bottom: 36px;
    padding: 24px 20px;
    background: var(--card-bg);
    border-radius: 16px;
    border: 1px solid rgba(232, 220, 200, 0.5);
  }

  .career-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    position: relative;
  }

  .career-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2.5px solid var(--forest);
    background: var(--card-bg);
  }

  .career-dot.active {
    background: var(--forest);
  }

  .career-dot.next {
    background: var(--card-bg);
    border-style: dashed;
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 0 0 rgba(74, 103, 65, 0.3); }
    50% { box-shadow: 0 0 0 6px rgba(74, 103, 65, 0); }
  }

  .career-step-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--charcoal);
    white-space: nowrap;
  }

  .career-step-year {
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
  }

  .career-line {
    width: 60px;
    height: 2px;
    background: var(--forest);
    margin: 0 12px;
    margin-bottom: 36px;
    flex-shrink: 0;
  }

  .career-line.dashed {
    background: none;
    border-top: 2px dashed var(--forest);
    opacity: 0.4;
  }

  /* EXPERIENCE CARDS */
  .exp-cards {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .exp-card {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 28px 32px;
    border: 1px solid rgba(232, 220, 200, 0.5);
    transition: all 0.3s ease;
  }

  .exp-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
  }

  .exp-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
  }

  .exp-card-role {
    font-family: var(--font-display);
    font-size: 20px;
    color: var(--charcoal);
    margin-bottom: 2px;
  }

  .exp-card-company {
    font-size: 14px;
    color: var(--muted);
    font-weight: 500;
  }

  .exp-card-summary {
    font-size: 15px;
    color: var(--charcoal);
    font-weight: 450;
    line-height: 1.6;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(232, 220, 200, 0.4);
  }

  .exp-card-period {
    font-size: 13px;
    font-weight: 600;
    color: var(--forest);
    white-space: nowrap;
    padding: 4px 12px;
    background: rgba(74, 103, 65, 0.08);
    border-radius: 20px;
  }

  .exp-metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 16px;
  }

  .exp-metric {
    text-align: center;
    padding: 16px 8px;
    background: var(--cream);
    border-radius: 12px;
  }

  .exp-metric-number {
    display: block;
    font-family: var(--font-display);
    font-size: 28px;
    color: var(--forest);
    line-height: 1;
    margin-bottom: 6px;
  }

  .exp-metric-label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
    line-height: 1.3;
  }

  .exp-metric-context {
    font-size: 11px;
    color: var(--muted);
    opacity: 0.7;
    line-height: 1.4;
    margin-top: 4px;
  }

  /* SKILLS */
  .skills-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 48px;
    padding-top: 40px;
    border-top: 1px solid var(--sand);
  }

  .skill-pill {
    padding: 8px 18px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 500;
    background: var(--warm-bg);
    color: var(--charcoal);
    border: 1px solid var(--sand);
    transition: all 0.25s ease;
    cursor: default;
  }

  .skill-pill:hover {
    background: var(--forest);
    color: white;
    border-color: var(--forest);
    transform: translateY(-2px);
  }

  /* CONTACT */
  .contact-section {
    background: var(--warm-bg);
  }

  /* LEADERSHIP */
  .leadership-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  .leadership-card {
